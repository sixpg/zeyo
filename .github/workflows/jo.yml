# .github/workflows/update-m3u.yml

name: Auto Update M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Generate M3U
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          python <<EOF
          import os, json, requests

          url = os.environ["API_URL"]
          r = requests.get(url, timeout=60)
          data = r.json()

          lines = ['#EXTM3U']

          for ch in data:
              name = ch.get("channel_name","Unknown")
              logo = ch.get("channel_logo","")
              gid = ch.get("channel_id","")
              group = ch.get("channel_genre","Live TV")
              stream = ch.get("channel_url","")
              kid = ch.get("keyId","")
              key = ch.get("key","")

              lines.append(f'#EXTINF:-1 tvg-id="{gid}" tvg-logo="{logo}" group-title="{group}",{name}')

              if kid not in ["", "null", None] and key not in ["", "null", None]:
                  lines.append("#KODIPROP:inputstream.adaptive.license_type=clearkey")
                  lines.append(f"#KODIPROP:inputstream.adaptive.license_key={kid}:{key}")

              lines.append(stream)
              lines.append("")

          with open("jtv.m3u", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          EOF

      - name: Commit Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jtv.m3u
          git commit -m "Auto update playlist" || echo "No changes"
          git push
